    <script>
function share(){
    FB.ui({
        method: 'feed',
        caption: '2022 復古食寓',
        redirect_uri: 'index.php',
        link: '<{$smarty.const.EVENT_URL}>?t=<{$smarty.get.t}>'
    }, function(response){
       // window.location.href="data.php#name";
    });
}
function invite() {
    if (navigator.share) {
        navigator.share({
            title: '2022 復古食寓',
            text: `歡迎回到1985年，細細品味「五木的經典美味」，復古食寓將帶你回味經典與過去再次相遇，一起重返懷舊美好時光！
                循著時光的痕跡，破解食光謎底，完成任務獲得抽獎資格，即有機會得到價值萬元的名牌鑄鐵鍋及活動限量推出的環保餐具唷！
            `,
            url: '<{$smarty.const.EVENT_URL}>',
        })
        .then(() => console.log('成功！'))
            .catch((error) => console.log('發生錯誤', error));
    }
}
function validForm(){
    if($('#name').val()==''){
        $('#name').focus();
        alert("請輸入姓名");
        return;
    }
    if($('#phone').val()==''){
        $('#phone').focus();
        alert("請輸入電話");
        return;
    }
    var pattern = new RegExp();
    pattern = /^\d{10,10}$/;
    if (!pattern .test($('#phone').val())) {
        alert("手機號碼不對");
        $('#phone').focus();
        return; //"email格式不對"
    }

    var mail = $('#email').val();
    var pattern = new RegExp();
    pattern = /^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/;
    if (!pattern .test(mail)) {
        alert("電子信箱格式不對");
        $('#email').focus();
        return; //"email格式不對"
    }
    if($('#address').val()==''){
        $('#address').focus();
        alert('請輸入地址');
        return;
    }
    /*
       if(!$('#privacy',$('#'+formid)).is(':checked')){
       alert("請先閱讀隱私權政策!!");
       return;
       }
     */
    var formdata = $('#form1').serialize();
    $.ajax({
        url: 'data.php',
        dataType:'json',
        type:'POST',
        data: formdata,
        success:function(res){
            alert(res.msg);
            if(res.status){
                window.location.href="index.php";
            }
        }

    });
}
